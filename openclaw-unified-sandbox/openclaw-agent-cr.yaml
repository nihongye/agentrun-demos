# OpenClaw 统一沙箱后端 — Agent CR
#
# 切换后端步骤：
#   1. 修改 SANDBOX_BACKEND 的值为 "e2b" 或 "agentscope"
#   2. 填写对应后端的连接参数（E2B 或 AgentScope 部分）
#   3. kubectl apply -f openclaw-agent-cr.yaml --kubeconfig=../../kubeconfig.txt
#
# 当前配置：E2B 后端（默认）
# 如需切换到 AgentScope：
#   - SANDBOX_BACKEND → "agentscope"
#   - 填写 SANDBOX_MANAGER_URL、SANDBOX_MANAGER_TOKEN、SANDBOX_TYPE
#   - E2B 参数可保留（不会被使用）

apiVersion: agentruntime.alibabacloud.com/v1alpha1
kind: Agent
metadata:
  name: openclaw-unified-sandbox
  namespace: default
spec:
  cluster:
    id: ${CLUSTER_ID}
  showName: openclaw-unified-sandbox
  type: managed
  template:
    spec:
      version: "1.0.0"
      artifact:
        type: Image
        repository:
          type: Custom
          image: apaas-registry.cn-hangzhou.cr.aliyuncs.com/agentrun/openclaw-unified:latest
          imagePullPolicy: Always
      accesses:
        - port: 18789
          type: http
      concurrency: 100
      idleTimeoutSeconds: 1800
      isolation: shared
      env:
        # === 后端选择 ===
        - name: SANDBOX_BACKEND
          value: "e2b"  # 可选值: "e2b" 或 "agentscope"

        # === LLM 配置（两种后端共用）===
        - name: LLM_BASE_URL
          value: "https://coding.dashscope.aliyuncs.com/v1"
        - name: LLM_API_KEY
          value: "${LLM_API_KEY}"
        - name: LLM_PROVIDER
          value: "dashscope"
        - name: LLM_MODEL_ID
          value: "qwen3-coder-plus"
        - name: LLM_MODEL_NAME
          value: "Qwen3 Coder Plus"

        # === 网关鉴权 ===
        - name: GATEWAY_TOKEN
          value: "demo-token-unified"

        # === E2B 后端参数（SANDBOX_BACKEND=e2b 时使用）===
        - name: E2B_API_KEY
          value: "${SANDBOX_MANAGER_TOKEN}"
        # E2B_API_URL 和 E2B_SANDBOX_URL 使用 entrypoint.sh 中的默认值
        # 如需自定义，取消注释：
        # - name: E2B_API_URL
        #   value: "http://sandbox-manager-service.agent-runtime-system.svc:8000/e2b"
        # - name: E2B_SANDBOX_URL
        #   value: "http://sandbox-manager-service.agent-runtime-system.svc:8000"
        # - name: E2B_TEMPLATE
        #   value: "e2b-sandbox"

        # === AgentScope 后端参数（SANDBOX_BACKEND=agentscope 时使用）===
        - name: SANDBOX_MANAGER_TOKEN
          value: "${SANDBOX_MANAGER_TOKEN}"
        - name: SANDBOX_MANAGER_URL
          value: "http://sandbox-manager-service.agent-runtime-system.svc:8000"
        - name: SANDBOX_TYPE
          value: "allinone-sandbox"

      livenessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 6
        successThreshold: 1
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 15
        periodSeconds: 5
        failureThreshold: 20
        successThreshold: 1
        timeoutSeconds: 5
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
      scaling:
        maxReplicas: 10
        minReplicas: 1
        scaleDownSeconds: 300
      storage:
        ephemeral:
          capacity: 1Gi
