apiVersion: agentruntime.alibabacloud.com/v1alpha1
kind: Agent
metadata:
  name: openclaw-agentscope
  namespace: default
spec:
  cluster:
    id: <your-cluster-id>
  showName: openclaw-agentscope
  type: managed
  template:
    spec:
      version: "1.0.3"
      artifact:
        type: Image
        repository:
          type: Custom
          image: apaas-registry.cn-hangzhou.cr.aliyuncs.com/agentrun/openclaw-agentscope:latest
          imagePullPolicy: Always
      accesses:
        - port: 18789
          type: http
      concurrency: 100
      idleTimeoutSeconds: 1800
      isolation: shared
      env:
        # === 必填 ===
        - name: LLM_BASE_URL
          value: "https://coding.dashscope.aliyuncs.com/v1"
        - name: LLM_API_KEY
          value: "<your-llm-api-key>"
        - name: SANDBOX_MANAGER_TOKEN
          value: "<your-sandbox-manager-token>"
        # === 可选（有默认值）===
        - name: LLM_PROVIDER
          value: "dashscope"
        - name: LLM_MODEL_ID
          value: "qwen3-coder-plus"
        - name: LLM_MODEL_NAME
          value: "Qwen3 Coder Plus"
        - name: SANDBOX_MANAGER_URL
          value: "http://sandbox-manager-service.agent-runtime-system.svc:8000"
        - name: SANDBOX_TYPE
          value: "allinone-sandbox"
        - name: GATEWAY_TOKEN
          value: "demo-token-agentscope"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 6
        successThreshold: 1
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 15
        periodSeconds: 5
        failureThreshold: 20
        successThreshold: 1
        timeoutSeconds: 5
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
      scaling:
        maxReplicas: 10
        minReplicas: 0
        scaleDownSeconds: 300
      storage:
        ephemeral:
          capacity: 1Gi
