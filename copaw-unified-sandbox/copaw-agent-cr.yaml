# CoPaw 统一沙箱后端 — Agent CR
#
# 切换后端步骤：
#   1. 修改 COPAW_CONFIG_JSON 的值：
#      - E2B:        {"sandbox":{"enabled":true,"template_id":"e2b-sandbox-copaw"}}
#      - AgentScope: {"sandbox":{"enabled":true,"type":"agentscope","template_id":"allinone-sandbox"}}
#   2. AgentScope 后端需要额外设置 SANDBOX_MANAGER_URL 和 SANDBOX_MANAGER_TOKEN
#   3. 更新后需要 delete + recreate（不是 apply），否则 Pod 不会拉取新配置：
#      kubectl delete -f copaw-agent-cr.yaml
#      kubectl apply -f copaw-agent-cr.yaml
#
# 当前配置：E2B 后端（默认）

apiVersion: agentruntime.alibabacloud.com/v1alpha1
kind: Agent
metadata:
  name: copaw-unified-sandbox
  namespace: default
spec:
  cluster:
    id: ${CLUSTER_ID}

  type: managed
  showName: CoPaw (Unified Sandbox)

  template:
    spec:
      isolation: shared

      artifact:
        type: Image
        repository:
          image: apaas-registry.cn-hangzhou.cr.aliyuncs.com/agentrun/copaw-unified:latest
          type: Custom
          imagePullPolicy: Always

      env:
        # ── CoPaw 运行时配置 ──────────────────────────────────────────────────
        - name: COPAW_WORKING_DIR
          value: /app/working
        - name: COPAW_SECRET_DIR
          value: /app/working.secret
        - name: COPAW_RUNNING_IN_CONTAINER
          value: "1"
        - name: COPAW_PORT
          value: "8088"
        - name: COPAW_CONSOLE_STATIC_DIR
          value: /app/venv/lib/python3.11/site-packages/copaw/console/dist

        # ── LLM Provider ─────────────────────────────────────────────────────
        - name: COPAW_PROVIDERS_JSON
          value: >-
            {"providers":{"aliyun-codingplan":{"base_url":"https://coding.dashscope.aliyuncs.com/v1","api_key":"${LLM_API_KEY}","extra_models":[],"chat_model":""}},"active_llm":{"provider_id":"aliyun-codingplan","model":"qwen3-coder-plus"}}

        # ── 沙箱配置（通过 sandbox.type 切换后端）────────────────────────────
        # E2B 后端（默认）:
        - name: COPAW_CONFIG_JSON
          value: '{"sandbox":{"enabled":true,"template_id":"e2b-sandbox-copaw"}}'
        # AgentScope 后端（切换时替换上面的值）:
        #   value: '{"sandbox":{"enabled":true,"type":"agentscope","template_id":"allinone-sandbox"}}'

        # ── E2B 后端连接参数（COPAW_CONFIG_JSON 无 type 或 type=e2b 时使用）──
        - name: E2B_API_URL
          value: http://sandbox-manager-service.agent-runtime-system.svc:8000/e2b
        - name: E2B_API_KEY
          value: ${E2B_API_KEY}
        - name: E2B_DOMAIN
          value: "${E2B_DOMAIN}"
        - name: E2B_SANDBOX_URL
          value: http://sandbox-manager-service.agent-runtime-system.svc:8000

        # ── AgentScope 后端连接参数（切换到 agentscope 时取消注释）──────────
        # - name: SANDBOX_MANAGER_URL
        #   value: http://sandbox-manager-service.agent-runtime-system.svc:8000
        # - name: SANDBOX_MANAGER_TOKEN
        #   value: ${SANDBOX_MANAGER_TOKEN}

        # ── CoPaw API 鉴权 ────────────────────────────────────────────────────
        - name: COPAW_API_KEYS
          value: "alice:${COPAW_API_KEY}"

        # ── 强制触发新 Revision（修改此值可强制重建 Pod，用于环境变量变更后重新部署）──
        - name: COPAW_BUILD_TIME
          value: "0"

      concurrency: 100
      idleTimeoutSeconds: 1800

      livenessProbe:
        httpGet:
          path: /api/version
          port: 8088
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
        successThreshold: 1

      readinessProbe:
        httpGet:
          path: /api/version
          port: 8088
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 10
        successThreshold: 1

      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 2Gi

      storage:
        ephemeral:
          capacity: 10Gi

      accesses:
        - type: http
          port: 8088

      scaling:
        minReplicas: 1
        maxReplicas: 10
        scaleDownSeconds: 300
