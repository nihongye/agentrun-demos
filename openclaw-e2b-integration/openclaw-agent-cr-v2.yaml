apiVersion: agentruntime.alibabacloud.com/v1alpha1
kind: Agent
metadata:
  name: openclaw-e2b-demo
  namespace: default
spec:
  cluster:
    id: ${CLUSTER_ID}
  showName: openclaw-e2b-demo
  type: managed
  template:
    spec:
      version: "1.0.0"
      artifact:
        type: Image
        repository:
          type: Custom
          image: apaas-registry.cn-hangzhou.cr.aliyuncs.com/agentrun/openclaw-e2b:latest
      accesses:
        - port: 18789
          type: http
      concurrency: 100
      idleTimeoutSeconds: 1800
      isolation: shared
      env:
        # === 必填 ===
        - name: LLM_BASE_URL
          value: "https://coding.dashscope.aliyuncs.com/v1"
        - name: LLM_API_KEY
          value: "${LLM_API_KEY}"
        - name: E2B_API_KEY
          value: "${SANDBOX_MANAGER_TOKEN}"
        # === 可选（有默认值）===
        - name: LLM_PROVIDER
          value: "dashscope"
        - name: LLM_MODEL_ID
          value: "qwen3-coder-plus"
        - name: LLM_MODEL_NAME
          value: "Qwen3 Coder Plus"
        - name: GATEWAY_TOKEN
          value: "demo-token-e2b-v4"
      # 不再需要 command/args — 镜像内置 entrypoint.sh 自动从环境变量生成配置
      livenessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 6
        successThreshold: 1
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /healthz
          port: 18789
        initialDelaySeconds: 15
        periodSeconds: 5
        failureThreshold: 20
        successThreshold: 1
        timeoutSeconds: 5
      resources:
        limits:
          cpu: "2"
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 512Mi
      scaling:
        maxReplicas: 10
        minReplicas: 0
        scaleDownSeconds: 300
      storage:
        ephemeral:
          capacity: 1Gi
