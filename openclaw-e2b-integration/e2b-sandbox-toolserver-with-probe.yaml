apiVersion: agentruntime.alibabacloud.com/v1alpha1
kind: ToolServer
metadata:
  name: e2b-sandbox
  namespace: default
spec:
  cluster:
    id: ${CLUSTER_ID}
  showName: "E2B Sandbox (multi-arch)"
  template:
    spec:
      accesses:
        - authentication:
            apiKey:
              headerName: Authorization
              source:
                key: API_KEY
                name: <YOUR_SECRET_NAME>
                optional: true
            name: <YOUR_AUTH_NAME>
          port: 49983
          type: http
      artifact:
        type: Image
        repository:
          image: apaas-registry.cn-hangzhou.cr.aliyuncs.com/agentrun/e2b-sandbox:latest
          type: Custom
      concurrency: 100
      idleTimeoutSeconds: 1800
      isolation: isolated
      readinessProbe:
        httpGet:
          path: /health
          port: 49983
        initialDelaySeconds: 3
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3
      livenessProbe:
        httpGet:
          path: /health
          port: 49983
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 5
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 125m
          memory: 256Mi
      scaling:
        maxReplicas: 10
        minReplicas: 0
        scaleDownSeconds: 30
      storage:
        ephemeral:
          capacity: 1Gi
  type: managed
